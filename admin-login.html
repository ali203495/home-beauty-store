<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — EL-WALI ADMIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .login-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-red) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            animation: moveOrb 20s infinite alternate;
        }

        @keyframes moveOrb {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            border-radius: var(--radius-xl);
            text-align: center;
            animation: slideUp 0.6s var(--ease);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-red);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .login-logo span { color: var(--text-primary); }

        .admin-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 2.5rem;
            display: block;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }

        .login-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-subtle);
            padding: 1rem;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s var(--ease);
        }

        .login-input:focus {
            outline: none;
            border-color: var(--accent-red);
            background: rgba(0,0,0,0.3);
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.1);
        }

        .login-btn {
            width: 100%;
            background: var(--accent-red);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
            box-shadow: 0 10px 20px -5px rgba(225, 29, 72, 0.4);
            transition: all 0.3s var(--ease);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(225, 29, 72, 0.5);
            background: var(--accent-red-dark);
        }

        .error-toast {
            position: absolute;
            top: 2rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 1rem 2rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 700;
            display: none;
            backdrop-filter: blur(10px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent-red); }
    </style>
</head>
<body>
    <div class="login-orb"></div>
    
    <div id="login-error" class="error-toast animate-scale">
        <i class="fas fa-exclamation-circle"></i> Accès refusé : Identifiants invalides
    </div>

    <div class="login-card glass">
        <div class="login-logo">EL-WALI<span>.ADMIN</span></div>
        <span class="admin-label">Contrôle de Sécurité</span>

        <form id="login-form">
            <div class="input-group">
                <label>Identifiant</label>
                <input type="text" id="username" class="login-input" placeholder="Administrateur" required spellcheck="false">
            </div>
            
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" class="login-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn">S'AUTHENTIFIER</button>
        </form>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Retour à la boutique
        </a>
    </div>

    <script src="js/admin.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            
            btn.innerText = 'ÉVALUATION...';
            btn.disabled = true;

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('login-error');

            const success = await Admin.login(user, pass);
            
            setTimeout(() => {
                if (success) {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    error.style.display = 'block';
                    btn.innerText = originalText;
                    btn.disabled = false;
                    document.querySelector('.login-card').style.animation = 'shake 0.4s';
                    setTimeout(() => {
                        error.style.display = 'none';
                        document.querySelector('.login-card').style.animation = '';
                    }, 3000);
                }
            }, 800);
        });
    </script>
</body>
</html>
