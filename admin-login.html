<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin — EL-WALI-SHOP</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .login-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            letter-spacing: -1.5px;
            color: var(--black);
        }

        .login-logo span { color: var(--accent-blue); }

        .admin-tag {
            display: inline-block;
            background: #f1f5f9;
            color: #64748b;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2.5rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
        }

        .login-input {
            width: 100%;
            background: white;
            border: 1px solid #cbd5e1;
            color: #1e293b;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: all 0.2s var(--ease);
        }

        .login-input:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-weight: 800;
            margin-top: 1.5rem;
            cursor: pointer;
            border: none;
            background: var(--accent-blue);
            color: white;
            font-size: 1rem;
            transition: all 0.2s var(--ease);
            letter-spacing: 0.02em;
        }

        .login-btn:hover {
            background: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.2);
        }

        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.8rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: none;
            border: 1px solid #fecaca;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent-blue); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">EL-WALI<span>.SHOP</span></div>
            <span class="admin-tag">Portail Administration</span>

            <form id="login-form">
                <div id="login-error" class="error-msg">Identifiants incorrects.</div>
                
                <div class="form-group">
                    <label class="form-label">Identifiant</label>
                    <input type="text" id="username" class="login-input" placeholder="Nom d'utilisateur" required spellcheck="false" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" id="password" class="login-input" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="login-btn">SE CONNECTER</button>
            </form>

            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Retour à la boutique
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/admin.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('login-error');

            const success = await Admin.login(user, pass);
            if (success) {
                window.location.href = 'admin-dashboard.html';
            } else {
                error.style.display = 'block';
                document.querySelector('.login-card').style.animation = 'none';
                void document.querySelector('.login-card').offsetWidth; // trigger reflow
                document.querySelector('.login-card').style.animation = 'shake 0.4s';
            }
        });

        // Add shake animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
