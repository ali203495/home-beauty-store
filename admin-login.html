<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — EL-WALI-SHOP</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: var(--space-2xl);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            text-align: center;
        }

        .login-logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: var(--space-xl);
            color: var(--gold);
        }

        .login-logo span {
            color: white;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">EL-WALI-<span>SHOP</span></div>
            <h2 style="margin-bottom: var(--space-lg); color: var(--gold)">PORTAIL ADMIN</h2>
            <form id="login-form">
                <div class="form-group" style="text-align: left">
                    <label class="form-label">Utilisateur</label>
                    <input type="text" name="username" class="form-input" placeholder="ali" required>
                </div>
                <div class="form-group" style="text-align: left">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <!-- 2FA PIN Hidden for simplicity during maintenance -->
                <div class="form-group" id="pin-group" style="display: none; text-align: left; margin-top: 1rem">
                    <label class="form-label" style="color: var(--gold)">Code PIN (Désactivé)</label>
                    <input type="password" name="pin" class="form-input" maxlength="4" placeholder="••••">
                </div>

                <div id="login-error" style="color: var(--rose); margin: 1rem 0; font-size: 0.8rem; display: none">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem">Se
                    Connecter</button>

                <div style="margin-top: 1.5rem">
                    <a href="#" onclick="Admin.toggleRecovery(true); return false;"
                        style="color: var(--gold); font-size: 0.8rem; text-decoration: none">Mot de passe oublié ?</a>
                </div>
            </form>

            <form id="recovery-form" style="display: none">
                <div class="form-group" style="text-align: left">
                    <label class="form-label">Email Gmail Récupération</label>
                    <input type="email" name="recovery_email" class="form-input" placeholder="votre-email@gmail.com"
                        required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem">Réinitialiser via
                    Gmail</button>
                <div style="margin-top: 1.5rem">
                    <a href="#" onclick="Admin.toggleRecovery(false); return false;"
                        style="color: var(--text-muted); font-size: 0.8rem; text-decoration: none"><i
                            class="fas fa-arrow-left"></i> Retour au login</a>
                </div>
            </form>

            <p style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-muted)">
                &copy; EL-WALI-SHOP Admin Portal
            </p>
        </div>
    </div>

    <script src="js/config.js?v=4"></script>
    <script src="js/admin.js?v=4"></script>
</body>

</html>
