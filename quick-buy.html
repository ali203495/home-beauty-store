<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achat Rapide — EL-WALI-SHOP</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-quick: #f8fafc;
        }

        body {
            background: var(--bg-quick);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            font-family: 'Inter', sans-serif;
        }

        .quick-card {
            background: white;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            box-shadow: var(--shadow-xl);
        }

        .quick-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .quick-logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent-red);
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .quick-logo span {
            color: var(--accent-slate);
        }

        .product-preview {
            display: flex;
            gap: 1.5rem;
            padding: 1.25rem;
            background: #f1f5f9;
            border-radius: var(--radius-md);
            margin-bottom: 2rem;
            align-items: center;
            border: 1px solid var(--border-subtle);
        }

        .product-preview img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            background: white;
            padding: 5px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
        }

        .product-preview-info h4 {
            color: var(--accent-slate);
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            line-height: 1.2;
        }

        .product-preview-info p {
            color: var(--accent-red);
            font-weight: 900;
            font-size: 1.25rem;
        }

        .btn-confirm {
            background: var(--accent-red);
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1.25rem;
            width: 100%;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.2s var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3);
        }

        .btn-confirm:hover {
            background: var(--accent-slate);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .cod-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fdf2f2;
            color: var(--accent-red);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .success-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-quick);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .success-icon {
            font-size: 5rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>

    <div class="quick-card">
        <div class="quick-header">
            <a href="/" class="quick-logo">MARRAKECH <span>LUXE</span></a>
            <div class="cod-badge">
                <i class="fas fa-truck"></i> Paiement à la livraison (COD)
            </div>
            <h3>Finaliser votre commande</h3>
        </div>

        <div id="quick-product-preview" class="product-preview">
            <!-- Populated by JS -->
        </div>

        <form id="quick-order-form">
            <div class="form-group">
                <label class="form-label">Nom Complet</label>
                <input type="text" name="name" class="form-input" placeholder="Ex: Ahmed Alami" required>
            </div>
            <div class="form-group">
                <label class="form-label">Téléphone (WhatsApp)</label>
                <input type="tel" name="phone" class="form-input" placeholder="06XXXXXXXX" required>
            </div>
            <div class="form-group">
                <label class="form-label">Adresse de Livraison</label>
                <textarea name="address" class="form-input" rows="2" placeholder="Ex: Rue 12, Appartement 5"
                    required></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Quartier (Marrakech)</label>
                <select name="neighborhood" class="form-input" required>
                    <option value="Guéliz">Guéliz</option>
                    <option value="Hivernage">Hivernage</option>
                    <option value="Médina">Médina</option>
                    <option value="Daudiate">Daudiate</option>
                    <option value="M'hamid">M'hamid</option>
                    <option value="Sidi Youssef Ben Ali">Sidi Youssef Ben Ali</option>
                    <option value="Targa">Targa</option>
                    <option value="Massira">Massira</option>
                </select>
            </div>

            <button aria-label="Action Button" type="submit" class="btn-confirm">
                Confirmer la Commande <i class="fas fa-check-circle"></i>
            </button>
            <p style="text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.8rem">
                Une fois confirmé, nous vous contacterons pour finaliser la livraison.
            </p>
        </form>
    </div>

    <!-- Success Screen -->
    <div class="success-overlay" id="success-screen">
        <div class="success-icon"><i class="fas fa-crown"></i></div>
        <h1 style="margin-bottom: 1rem">Merci pour votre confiance !</h1>
        <p style="color: var(--text-muted); max-width: 400px; margin-bottom: 2.5rem">
            Votre commande a été reçue avec succès. Notre équipe vous contactera dans les plus brefs délais sur votre
            numéro WhatsApp.
        </p>
        <button aria-label="Action Button" class="btn btn-primary" onclick="window.location.href='/'">Retour à la Boutique</button>
    </div>

            <script src="js/config.js"></script>
    <script src="js/products.js"></script>
    <script>
        let product = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await ProductDB.fetchAll();

            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            product = PRODUCTS.find(p => p.id === productId);

            if (!product) {
                window.location.href = 'index.html';
                return;
            }

            // Render preview
            document.getElementById('quick-product-preview').innerHTML = `
                <img alt="EL-WALI-SHOP Product" src="${product.image}" alt="${product.name}">
                <div class="product-preview-info">
                    <h4>${product.name}</h4>
                    <p>${product.price} DH</p>
                </div>
            `;
        });
        // Handle Order
        document.getElementById('quick-order-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            if(!product) return;

            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Traitement...';
            btn.disabled = true;

            const formData = new FormData(this);

            const orderData = {
                id: 'QUICK-' + Date.now().toString().slice(-6),
                date: new Date().toISOString(),
                customer: {
                    name: formData.get('name'),
                    phone: formData.get('phone'),
                    address: formData.get('address'),
                    neighborhood: formData.get('neighborhood')
                },
                items: [{
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1,
                    category: product.category,
                    image: product.image
                }],
                total: product.price,
                status: 'Nouveau',
                type: 'Achat Rapide'
            };

            try {
                // Save via OrderDB
                if (typeof OrderDB !== 'undefined') {
                    await OrderDB.saveOrder(orderData);
                } else {
                    const orders = JSON.parse(localStorage.getItem('mlh_orders')) || [];
                    orders.unshift(orderData);
                    localStorage.setItem('mlh_orders', JSON.stringify(orders));
                }

                // Show success
                window.location.href = `order-success.html?id=${orderData.id}`;
            } catch (err) {
                console.error("Erreur lors de la commande rapide:", err);
                alert("Erreur lors de la validation. Veuillez réessayer.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
