<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaire Nettoyage Professionnel - EL-WALI-SHOP</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .pres-header {
            padding: var(--space-2xl) 0;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg-primary));
            border-bottom: 2px solid var(--gold);
        }

        .contact-summary {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .table-container {
            margin-top: 3rem;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: var(--bg-secondary);
            color: var(--gold);
            padding: 1.25rem 1rem;
            font-family: var(--font-display);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-accent);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-size: 0.95rem;
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .price-tag {
            font-weight: 700;
            color: var(--gold);
            white-space: nowrap;
        }

        .specs-list {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .specs-list div {
            margin-bottom: 0.2rem;
        }

        .export-actions {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .btn-action {
            background: var(--gold);
            color: black;
            padding: 0.8rem 2rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-action.secondary {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .btn-action:hover {
            background: var(--gold-light);
            box-shadow: 0 0 15px rgba(201, 149, 108, 0.3);
        }

        @media print {

            .export-actions,
            .nav {
                display: none;
            }

            body {
                background: white;
                color: black;
                padding: 0;
            }

            .table-container {
                border: 1px solid #ddd;
                box-shadow: none;
                border-radius: 0;
            }

            th {
                background: #f0f0f0;
                color: black;
                border-bottom: 2px solid #8a6d3b;
            }

            td {
                border-bottom: 1px solid #eee;
            }

            .price-tag {
                color: #8a6d3b !important;
            }
        }
    </style>
    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>

<body>
    <header class="pres-header text-center">
        <div class="container">
            <span class="section-tag animate-fade-up">Inventaire Professionnel</span>
            <h1 class="text-gold animate-fade-up-delay-1">EL-WALI-SHOP</h1>
            <p class="section-subtitle animate-fade-up-delay-2">Catalogue de Nettoyage Sectoriel (Aéroport)</p>

            <div class="contact-summary animate-fade-up-delay-3">
                <span>📍 Marrakech</span>
                <span>📞 0615653798</span>
                <span>📞 0699705617</span>
            </div>
        </div>
    </header>

    <main class="container section">
        <div class="table-container animate-fade-up-delay-1">
            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">Image</th>
                        <th style="width: 20%;">Produit</th>
                        <th style="width: 12%;">Prix (MAD)</th>
                        <th style="width: 15%;">Catégorie</th>
                        <th style="width: 23%;">Description</th>
                        <th style="width: 20%;">Spécifications</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    <!-- Dynamic Data -->
                </tbody>
            </table>
        </div>

        <div class="export-actions">
            <button aria-label="Action Button" class="btn-action" onclick="window.print()">
                <span>📄</span> Imprimer / PDF
            </button>
            <a href="cleaning-products.csv" download class="btn-action secondary">
                <span>📊</span> Télécharger Excel (CSV)
            </a>
        </div>
    </main>

            <script src="js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await ProductDB.fetchAll();
            const tbody = document.getElementById('product-table-body');

            // Filter and define cleaning categories we want to show
            const cleaningCategories = [
                'Équipements de Nettoyage',
                'Fournitures de Nettoyage',
                'Nettoyage des Sols',
                'Outils de Nettoyage'
            ];

            const cleaners = PRODUCTS.filter(p => cleaningCategories.includes(p.category));

            // Group by category
            const groups = cleaningCategories.reduce((acc, cat) => {
                const filtered = cleaners.filter(p => p.category === cat);
                if (filtered.length > 0) acc[cat] = filtered;
                return acc;
            }, {});

            let html = '';
            for (const [category, products] of Object.entries(groups)) {
                // Category Header Row
                html += `
                    <tr style="background: rgba(201, 149, 108, 0.08);">
                        <td colspan="6" style="color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; border-left: 4px solid var(--gold);">
                            ${category}
                        </td>
                    </tr>
                `;

                // Product Rows
                html += products.map(p => `
                    <tr>
                        <td>
                            <img alt="EL-WALI-SHOP Product" src="${p.image}" alt="${p.name}" style="width: 60px; height: 60px; object-fit: contain; border-radius: 4px; background: #222;">
                        </td>
                        <td style="font-weight: 600;">${p.name}</td>
                        <td><span class="price-tag">${p.price} MAD</span></td>
                        <td style="font-size: 0.85rem; opacity: 0.8;">${p.category}</td>
                        <td style="font-size: 0.9rem; color: var(--text-secondary);">${p.description}</td>
                        <td class="specs-list">
                            ${Object.entries(p.specs).map(([k, v]) => `<div><strong>${k}:</strong> ${v}</div>`).join('')}
                        </td>
                    </tr>
                `).join('');
            }

            tbody.innerHTML = html;
        });
    </script>
</body>

</html>
