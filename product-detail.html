<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détails du Produit — EL-WALI-SHOP</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="scroll-progress" id="scroll-progress"></div>

    <!-- 1. TOP BAR (RED) -->
    <div class="top-bar">
        <div class="container flex-between">
            <div class="flex gap-lg">
                <span><i class="fas fa-truck"></i> LIVRAISON GRATUITE SUR TOUT MARRAKECH</span>
                <span><i class="fas fa-phone"></i> +212 699-705617</span>
            </div>
            <div class="flex gap-lg">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="/admin-login.html" style="opacity: 0.5;">ADMIN</a>
            </div>
        </div>
    </div>

    <!-- 2. MAIN HEADER -->
    <header class="main-header">
        <div class="container flex-between gap-xl">
            <i class="fas fa-bars mobile-menu-btn" onclick="toggleMobileDrawer()"></i>
            <a href="/" class="nav-logo">EL-WALI<span>.SHOP</span></a>

            <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="global-search" placeholder="Rechercher un produit, une marque, une catégorie...">
                <button class="search-btn">Rechercher</button>
                <div class="search-suggestions" id="search-suggestions"></div>
            </div>

            <div class="nav-actions">
                <div class="nav-action-item">
                    <i class="fas fa-user-circle"></i>
                    <span>Compte</span>
                </div>
                <div class="nav-action-item cart-icon-wrapper" onclick="window.location.href='/cart'">
                    <i class="fas fa-shopping-basket"></i>
                    <span>Panier</span>
                    <span class="cart-badge">0</span>
                </div>
            </div>
            <i class="fas fa-search mobile-search-btn" onclick="toggleMobileSearch()"></i>
        </div>
        <div class="mobile-search-overlay" id="mobile-search-overlay">
            <input type="text" placeholder="Rechercher..." id="mobile-search-input">
            <div class="search-suggestions" id="mobile-suggestions"></div>
        </div>
    </header>

    <!-- 3. SECONDARY NAVBAR -->
    <nav class="secondary-nav">
        <div class="container flex">
            <button class="cat-toggle-btn" onclick="window.location.href='/'">
                <i class="fas fa-bars"></i> NOS RAYONS
            </button>
            <div class="mega-nav-links">
                <a href="/products?cat=Electroménager">Electroménager</a>
                <a href="/products?cat=TV">TV & Audio</a>
                <a href="/products?cat=Climatisation">Climatisation</a>
                <a href="/products?cat=Cuisine">Cuisine</a>
                <a href="/products?cat=Beauté">Beauté & Soin</a>
                <a href="/products?cat=Promos" style="color: var(--accent-red); font-weight: 900;">PROMOTIONS %</a>
            </div>
        </div>
    </nav>

  <section class="section" style="padding-top: 2rem;">
    <div class="container">
      <div class="breadcrumb" style="font-size: 0.82rem; margin-bottom: 2rem; color: var(--text-muted);">
        <a href="/" style="text-decoration: underline;">Accueil</a>
        <span class="breadcrumb-sep">/</span>
        <a href="/products" style="text-decoration: underline;">Produits</a>
        <span class="breadcrumb-sep">/</span>
        <span id="breadcrumb-current">Produit</span>
      </div>

      <div class="product-detail-grid" id="product-detail-container">
        <!-- Will be populated by JS -->
      </div>
    </div>
  </section>

  <section class="section" style="background: var(--bg-primary); border-top: 1px solid var(--border-subtle);">
    <div class="container">
      <h2 class="section-title" style="font-weight: 900; font-size: 1.8rem; margin-bottom: 2rem; color: var(--accent-slate);">PRODUITS SIMILAIRES</h2>
      <div class="product-grid" id="related-grid"></div>
    </div>
  </section>

  <footer class="footer" style="background: var(--bg-secondary); border-top: 1px solid var(--border-subtle); padding: 4rem 0 2rem;">
    <div class="container footer-bottom" style="text-align: center; color: var(--text-muted); font-size: 0.85rem;">
      <p>&copy; <span id="current-year"></span> EL-WALI-SHOP. Votre partenaire Electroménager & Beauté à Marrakech.</p>
    </div>
  </footer>

  <div id="toast-container" class="toast-container"></div>

            <script src="js/config.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const product = PRODUCTS.find(p => p.id === id);

      if (!product || product.visible === false) {
        window.location.href = '/products.html';
        return;
      }

      document.title = `${product.name} — EL-WALI-SHOP.MA`;
      document.getElementById('breadcrumb-current').textContent = product.name.toUpperCase();
      const container = document.getElementById('product-detail-container');
      container.innerHTML = `
        <div class="product-gallery" style="background: white; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 2rem; display: flex; align-items: center; justify-content: center;">
          <img src="${product.image}" alt="${product.name}" style="max-width: 100%; max-height: 500px; object-fit: contain;">
        </div>
        <div class="product-info">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
            <span style="background: var(--accent-red); color: white; padding: 0.25rem 0.75rem; border-radius: 50px; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em;">${product.category}</span>
            <span style="color: #22c55e; font-weight: 800; font-size: 0.75rem;"><i class="fas fa-check-circle"></i> EN STOCK</span>
          </div>
          
          <h1 style="font-size: 2.2rem; font-weight: 900; color: var(--accent-slate); line-height: 1.1; margin-bottom: 1rem; border-bottom: 2px solid var(--bg-primary); padding-bottom: 1rem;">${product.name}</h1>
          
          <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
            <div style="font-size: 2.8rem; font-weight: 900; color: var(--accent-red);">${product.price} <span style="font-size: 1.2rem;">DH</span></div>
            <div style="text-decoration: line-through; color: var(--text-muted); font-weight: 600;">${Math.round(product.price * 1.2)} DH</div>
          </div>
          
          <div style="background: #f1f5f9; border-radius: var(--radius-md); padding: 1.5rem; margin-bottom: 2rem;">
            <h4 style="font-weight: 900; font-size: 0.85rem; color: var(--accent-slate); text-transform: uppercase; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-info-circle" style="color: var(--accent-red);"></i> DESCRIPTION
            </h4>
            <p style="font-size: 0.95rem; color: var(--text-secondary); line-height: 1.6;">${product.description || 'Aucune description disponible pour cet article.'}</p>
          </div>

          <div class="action-card" style="background: white; border: 2px solid var(--accent-red); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-md);">
              <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div class="qty-control" style="display: flex; align-items: center; border: 2px solid var(--border-subtle); border-radius: var(--radius-sm); overflow: hidden; background: white; height: 54px;">
                  <button onclick="updateQty(-1)" style="padding: 0 1.25rem; border: none; background: none; cursor: pointer; font-weight: 900; font-size: 1.2rem;">-</button>
                  <span id="qty-val" style="padding: 0 1.5rem; font-weight: 900; border-left: 1px solid var(--border-subtle); border-right: 1px solid var(--border-subtle); font-size: 1.1rem; min-width: 60px; text-align: center;">1</span>
                  <button onclick="updateQty(1)" style="padding: 0 1.25rem; border: none; background: none; cursor: pointer; font-weight: 900; font-size: 1.2rem;">+</button>
                </div>
                <button class="btn-retail" onclick="handleAddToCart('${product.id}')" style="flex: 1; background: var(--accent-slate); color: white; border: none; border-radius: var(--radius-sm); font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 1rem; cursor: pointer; height: 54px; font-size: 0.9rem;">
                    <i class="fas fa-shopping-basket"></i> AJOUTER AU PANIER
                </button>
              </div>
              <button class="btn-retail" onclick="window.location.href='/checkout.html?id=${product.id}'" style="width: 100%; background: var(--accent-red); color: white; border: none; border-radius: var(--radius-sm); font-weight: 900; padding: 1.2rem; cursor: pointer; font-size: 1.1rem; letter-spacing: 0.02em; box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3);">
                ACHETER MAINTENANT — PAIEMENT À LA LIVRAISON
              </button>
          </div>
          
          <div style="margin-top: 2rem; display: flex; gap: 1.5rem; font-size: 0.8rem; color: var(--text-secondary); font-weight: 700;">
            <span><i class="fas fa-shield-alt" style="color: var(--accent-red);"></i> GARANTIE 1 AN</span>
            <span><i class="fas fa-undo" style="color: var(--accent-red);"></i> RETOUR 7 JOURS</span>
            <span><i class="fas fa-truck" style="color: var(--accent-red);"></i> LIVRAISON EXPRESS</span>
          </div>
        </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2rem;">
            <button class="btn btn-secondary" onclick="shareToWhatsApp('${product.id}')" style="text-transform: none; font-size: 0.75rem; padding: 0.6rem; border-radius: var(--radius-sm);">
              <i class="fab fa-whatsapp" style="color: #25D366;"></i> WhatsApp
            </button>
            <button class="btn btn-secondary" onclick="shareToFacebook('${product.id}')" style="text-transform: none; font-size: 0.75rem; padding: 0.6rem; border-radius: var(--radius-sm);">
              <i class="fab fa-facebook-f" style="color: #1877F2;"></i> Facebook
            </button>
          </div>

          <div class="detail-specs" style="background: white; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 1.5rem;">
            <h4 style="font-weight: 800; margin-bottom: 1rem; color: var(--black); border-bottom: 2px solid var(--bg-primary); padding-bottom: 0.5rem;">Spécifications Techniques</h4>
            <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                ${Object.entries(product.specs || {}).map(([key, val]) => `
                <div class="detail-spec-row" style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--bg-primary); padding-bottom: 0.5rem; font-size: 0.85rem;">
                    <span class="spec-key" style="font-weight: 700; color: var(--text-secondary);">${key}</span>
                    <span class="spec-val" style="color: var(--black); font-weight: 500;">${val || '-'}</span>
                </div>
                `).join('')}
            </div>
          </div>
        </div>
      `;

      // Load related (only visible ones)
      const related = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id && p.visible !== false).slice(0, 4);
      document.getElementById('related-grid').innerHTML = related.map(p => App.generateProductCard(p)).join('');
    }

    let currentQty = 1;
    function updateQty(delta) {
      currentQty = Math.max(1, currentQty + delta);
      const qtyVal = document.getElementById('qty-val');
      if (qtyVal) qtyVal.textContent = currentQty;
    }

    function handleAddToCart(id) {
      Cart.add(id, currentQty);
      // Optional: Update nav badge if not automatic
      const badge = document.getElementById('cart-badge-nav');
      if(badge) {
          const total = Cart.items.reduce((sum, item) => sum + item.qty, 0);
          badge.textContent = total;
          badge.style.display = total > 0 ? 'flex' : 'none';
      }
    }

    /**
     * Injects JSON-LD structured data for the specific product
     */
    function injectStructuredData(product) {
      const script = document.createElement('script');
      script.type = 'application/ld+json';
      const ldData = {
        "@context": "https://schema.org/",
        "@type": "Product",
        "name": product.name,
        "image": [
          `https://ali203495.github.io/home-beauty-store/${product.image}`
        ],
        "description": product.description,
        "sku": product.id,
        "brand": {
          "@type": "Brand",
          "name": "EL-WALI-SHOP"
        },
        "offers": {
          "@type": "Offer",
          "url": window.location.href,
          "priceCurrency": "MAD",
          "price": product.price,
          "availability": "https://schema.org/InStock",
          "itemCondition": "https://schema.org/NewCondition"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": product.rating,
          "reviewCount": product.reviews
        }
      };
      script.text = JSON.stringify(ldData);
      document.head.appendChild(script);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await ProductDB.fetchAll();
      loadProduct();
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const product = PRODUCTS.find(p => p.id === id);
      if (product) injectStructuredData(product);
    });
  </script>
</body>

</html>
